<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>老棚邮局 · 写一封信</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf8f3;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;display:flex;justify-content:center;padding:2rem 0 4rem}
#app{width:360px;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 3rem}
.title-block{text-align:center;margin-bottom:1.5rem}
.title-block h1{font-size:20px;font-weight:500;color:#2a2018;letter-spacing:.12em;margin-bottom:6px}
.title-block p{font-size:12px;color:#7a6a50;line-height:1.9}
#scene{position:relative;width:320px;height:460px;margin-bottom:1rem;user-select:none}
#paper{position:absolute;top:0;left:0;width:320px;height:420px;border-radius:1px;overflow:hidden;background-color:#ede5c8}
#paper-liner{position:absolute;inset:0;background:repeating-linear-gradient(transparent,transparent 27px,rgba(140,120,70,.1) 27px,rgba(140,120,70,.1) 28px);pointer-events:none;z-index:1}
#paper-textarea{position:absolute;inset:24px 20px;background:transparent;border:none;outline:none;font-size:14px;font-family:inherit;color:#2e2416;line-height:28px;resize:none;width:calc(100% - 40px);height:calc(100% - 48px);z-index:2}
#paper-textarea::placeholder{color:#9a8a68;font-size:13px}
#burn-canvas{position:absolute;top:0;left:0;width:320px;height:420px;pointer-events:none;border-radius:1px;z-index:3}
#smoke-svg{position:absolute;top:-80px;left:0;width:320px;height:80px;pointer-events:none;overflow:visible;z-index:10}
#match-wrap{position:absolute;bottom:20px;right:10px;width:40px;height:130px;cursor:grab;z-index:20;touch-action:none}
#match-wrap.dragging{cursor:grabbing}
#name-wrap{width:320px;display:flex;align-items:center;gap:8px;margin-bottom:1rem}
#name-wrap label{font-size:12px;color:#7a6a50;white-space:nowrap}
#name-input{flex:1;background:transparent;border:none;border-bottom:.5px solid #c0aa80;border-radius:0;font-size:13px;color:#2a2018;padding:4px 0;outline:none}
#name-input::placeholder{color:#a09070}
#status-msg{font-size:12px;color:#7a6a50;text-align:center;min-height:18px;margin-bottom:.8rem;letter-spacing:.03em}
#strike-hint{font-size:11px;color:#9a8060;text-align:center;margin-bottom:.8rem;letter-spacing:.04em;transition:opacity .4s}
hr.div{width:320px;border:none;border-top:.5px solid #d8ceb0;margin-bottom:1.2rem}
.wall-title{font-size:11px;color:#9a8a68;text-align:center;margin-bottom:.8rem;letter-spacing:.07em}
#letters-wall{width:320px;display:flex;flex-direction:column;gap:10px}
.lcard{border-radius:1px;border:.5px solid #c8b480;padding:11px 13px;opacity:0;animation:fi .7s forwards;position:relative;overflow:hidden}
.lcard-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.9}
.lcard-content{position:relative;z-index:1}
@keyframes fi{to{opacity:1}}
.ln{font-size:11px;color:#6b5a38;margin-bottom:5px;letter-spacing:.04em}
.lt{font-size:13px;color:#2e2416;line-height:1.78;white-space:pre-wrap;word-break:break-all}
.la{font-size:11px;color:#a09070;margin-top:5px;font-style:italic}
#empty-hint{font-size:12px;color:#9a8a68;text-align:center;padding:.8rem 0}
</style>
</head>
<body>
<div id="app">
  <div class="title-block">
    <h1>老棚邮局</h1>
    <p>写下你想说的话<br>把右下角的火柴拖到纸上来回划动，点燃它<br>让这张纸带走你想说的</p>
  </div>
  <div id="scene">
    <canvas id="burn-canvas" width="320" height="420"></canvas>
    <svg id="smoke-svg" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="paper">
      <div id="paper-liner"></div>
      <textarea id="paper-textarea" placeholder="给某个人，或某件事，写几个字&#10;&#10;可以是一句话，可以是一个名字&#10;可以是你一直没说出口的……"></textarea>
    </div>
    <div id="match-wrap">
      <svg viewBox="0 0 40 130" xmlns="http://www.w3.org/2000/svg" width="40" height="130">
        <rect x="17" y="22" width="6" height="104" rx="2" fill="#7a5c10"/>
        <ellipse id="mhead" cx="20" cy="16" rx="9" ry="10" fill="#9b2d1f"/>
        <ellipse id="mglow" cx="20" cy="16" rx="9" ry="10" fill="none" opacity="0"/>
        <ellipse id="mflame1" cx="20" cy="8" rx="5" ry="7" fill="#e67e22" opacity="0"/>
        <ellipse id="mflame2" cx="20" cy="5" rx="3" ry="5" fill="#f9ca24" opacity="0"/>
      </svg>
    </div>
  </div>
  <div id="strike-hint">← 将右下角火柴拖到纸上来回划动点燃</div>
  <div id="name-wrap">
    <label>署名（可不填）</label>
    <input id="name-input" type="text" placeholder="一个路过的人" maxlength="20"/>
  </div>
  <div id="status-msg"></div>
  <hr class="div"/>
  <div class="wall-title">已寄出的信 · 愿它们都到了该去的地方</div>
  <div id="letters-wall"><div id="empty-hint">还没有人写信，你来第一个</div></div>
</div>

const paperEl = document.getElementById('paper');
const ta = document.getElementById('paper-textarea');
const burnCanvas = document.getElementById('burn-canvas');
const bCtx = burnCanvas.getContext('2d');
const matchWrap = document.getElementById('match-wrap');
const mhead = document.getElementById('mhead');
const mglow = document.getElementById('mglow');
const mflame1 = document.getElementById('mflame1');
const mflame2 = document.getElementById('mflame2');
const smokeSvg = document.getElementById('smoke-svg');
const statusMsg = document.getElementById('status-msg');
const lettersWall = document.getElementById('letters-wall');
const nameInput = document.getElementById('name-input');
const strikeHint = document.getElementById('strike-hint');
const scene = document.getElementById('scene');

paperEl.style.backgroundImage = 'url(' + PAPER_IMG + ')';
paperEl.style.backgroundSize = 'cover';
paperEl.style.backgroundPosition = 'center';

const seeds=[
  {name:'阿木',text:'爸，今年清明我没能回去。\n你喜欢的那瓶酒，我替你喝了一口。',time:'3小时前'},
  {name:'一个路过的人',text:'外婆，你做的米豆腐我再也没吃到过那个味道。',time:'昨天'},
];
let letters=[...seeds],burning=false,lit=false;
let dragging=false,matchX=280,matchY=310;
let startDX,startDY,startMX,startMY,strikeProgress=0;

function setMatchPos(x,y){
  matchX=Math.max(0,Math.min(280,x));
  matchY=Math.max(0,Math.min(390,y));
  matchWrap.style.left=matchX+'px';
  matchWrap.style.top=matchY+'px';
  matchWrap.style.right='auto';
  matchWrap.style.bottom='auto';
}
setMatchPos(280,310);

function getSPos(e){
  const r=scene.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:cx-r.left,y:cy-r.top};
}

matchWrap.addEventListener('mousedown',function(e){if(burning)return;e.preventDefault();dragging=true;matchWrap.classList.add('dragging');const p=getSPos(e);startDX=p.x;startDY=p.y;startMX=matchX;startMY=matchY;strikeHint.style.opacity='0';});
matchWrap.addEventListener('touchstart',function(e){if(burning)return;e.preventDefault();dragging=true;matchWrap.classList.add('dragging');const p=getSPos(e);startDX=p.x;startDY=p.y;startMX=matchX;startMY=matchY;strikeHint.style.opacity='0';},{passive:false});

window.addEventListener('mousemove',function(e){
  if(!dragging)return;
  const p=getSPos(e);
  setMatchPos(startMX+(p.x-startDX),startMY+(p.y-startDY));
  const hx=matchX+20,hy=matchY+16;
  if(!lit&&hx>=0&&hx<=320&&hy>=0&&hy<=420){
    strikeProgress+=3;
    mhead.setAttribute('fill',strikeProgress>30?'#c0392b':'#9b2d1f');
    if(strikeProgress>80)lightMatch();
  } else {
    strikeProgress=Math.max(0,strikeProgress-2);
    if(!lit)mhead.setAttribute('fill','#9b2d1f');
  }
});
window.addEventListener('touchmove',function(e){
  if(!dragging)return;e.preventDefault();
  const p=getSPos(e);
  setMatchPos(startMX+(p.x-startDX),startMY+(p.y-startDY));
  const hx=matchX+20,hy=matchY+16;
  if(!lit&&hx>=0&&hx<=320&&hy>=0&&hy<=420){
    strikeProgress+=3;
    mhead.setAttribute('fill',strikeProgress>30?'#c0392b':'#9b2d1f');
    if(strikeProgress>80)lightMatch();
  } else {
    strikeProgress=Math.max(0,strikeProgress-2);
    if(!lit)mhead.setAttribute('fill','#9b2d1f');
  }
},{passive:false});

window.addEventListener('mouseup',function(){if(!dragging)return;dragging=false;matchWrap.classList.remove('dragging');if(!lit){strikeProgress=0;strikeHint.style.opacity='1';mhead.setAttribute('fill','#9b2d1f');}});
window.addEventListener('touchend',function(){if(!dragging)return;dragging=false;matchWrap.classList.remove('dragging');if(!lit){strikeProgress=0;strikeHint.style.opacity='1';mhead.setAttribute('fill','#9b2d1f');}});

function lightMatch(){
  if(lit)return;lit=true;
  mhead.setAttribute('fill','#e67e22');
  mglow.setAttribute('fill','#f39c12');mglow.setAttribute('opacity','0.5');
  mflame1.setAttribute('opacity','0.9');mflame2.setAttribute('opacity','0.9');
  statusMsg.textContent='火柴点燃了……';
  var flicker=setInterval(function(){
    mflame1.setAttribute('ry',(6+Math.random()*3).toFixed(1));
    mflame1.setAttribute('cy',(7+Math.random()*3).toFixed(1));
    mflame2.setAttribute('ry',(4+Math.random()*2).toFixed(1));
  },80);
  setTimeout(function(){
    clearInterval(flicker);
    if(ta.value.trim()){startBurn();}
    else{statusMsg.textContent='先写点什么吧';resetMatch();}
  },700);
}

function resetMatch(){
  lit=false;strikeProgress=0;
  mhead.setAttribute('fill','#9b2d1f');
  mglow.setAttribute('opacity','0');
  mflame1.setAttribute('opacity','0');mflame2.setAttribute('opacity','0');
  setMatchPos(280,310);
  strikeHint.style.opacity='1';
}

function startBurn(){
  if(burning)return;burning=true;
  ta.style.pointerEvents='none';
  matchWrap.style.display='none';
  statusMsg.textContent='纸在燃烧……';
  var W=320,H=420,pixels=new Float32Array(W*H),frame=0,total=110;
  function drawFrame(){
    frame++;
    var prog=frame/total,burnLine=H*(1-prog*1.12);
    var imgData=bCtx.createImageData(W,H),d=imgData.data;
    for(var y=0;y<H;y++){
      for(var x=0;x<W;x++){
        var i=y*W+x,dist=y-burnLine;
        var target=dist>0?0:Math.min(1,(-dist/50)+Math.random()*.28);
        pixels[i]=Math.min(1,pixels[i]+(target-pixels[i])*.16+Math.random()*.045);
        var b=pixels[i],pi=i*4;
        if(b>.83){d[pi]=28;d[pi+1]=16;d[pi+2]=10;d[pi+3]=Math.round((1-b)*65);}
        else if(b>.52){var t=(b-.52)/.31;d[pi]=Math.round(215+40*(1-t));d[pi+1]=Math.round(90*(1-t));d[pi+2]=0;d[pi+3]=Math.round(210*b);}
        else if(b>.22){d[pi]=40;d[pi+1]=20;d[pi+2]=8;d[pi+3]=Math.round(b*215);}
      }
    }
    bCtx.putImageData(imgData,0,0);
    puffSmoke(frame);
    if(frame<total)requestAnimationFrame(drawFrame);else finishBurn();
  }
  drawFrame();
}

var puffs=[];
function puffSmoke(f){
  if(f%5===0)puffs.push({x:100+Math.random()*120,y:76,r:3+Math.random()*5,vx:(Math.random()-.5)*2,vy:-1.3-Math.random()*.9,life:1});
  smokeSvg.innerHTML='';
  puffs=puffs.filter(function(p){return p.life>.04;});
  puffs.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.r+=.4;p.life-=.032;
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',p.r);
    c.setAttribute('fill','rgba(85,75,65,'+p.life*.2+')');
    smokeSvg.appendChild(c);
  });
}

function finishBurn(){
  statusMsg.textContent='已寄出，愿它到了该去的地方';
  var name=nameInput.value.trim()||'一个路过的人';
  var text=ta.value.trim();
  letters.push({name:name,text:text,time:'刚刚'});
  renderLetters();
  setTimeout(function(){
    [burnCanvas,paperEl].forEach(function(el){el.style.transition='opacity .9s';el.style.opacity='0';});
  },900);
  setTimeout(function(){
    bCtx.clearRect(0,0,320,420);
    [burnCanvas,paperEl].forEach(function(el){el.style.transition='';el.style.opacity='1';});
    ta.value='';nameInput.value='';ta.style.pointerEvents='';
    burning=false;lit=false;strikeProgress=0;puffs=[];smokeSvg.innerHTML='';
    matchWrap.style.display='';statusMsg.textContent='';resetMatch();
  },2400);
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderLetters(){
  lettersWall.innerHTML='';
  if(!letters.length){lettersWall.innerHTML='<div id="empty-hint">还没有人写信，你来第一个</div>';return;}
  letters.slice().reverse().forEach(function(l,i){
    var card=document.createElement('div');
    card.className='lcard';
    card.style.animationDelay=(i*.05)+'s';
    var bg=document.createElement('div');
    bg.className='lcard-bg';
    bg.style.backgroundImage='url('+PAPER_IMG+')';
    var content=document.createElement('div');
    content.className='lcard-content';
    content.innerHTML='<div class="ln">'+esc(l.name||'一个路过的人')+'</div><div class="lt">'+esc(l.text)+'</div><div class="la">'+l.time+' · 已寄出</div>';
    card.appendChild(bg);card.appendChild(content);lettersWall.appendChild(card);
  });
}

renderLetters();
</script>
</body>
</html>
